<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQA Weekly Report Generator</title>
    <style>
      :root {
        --navy: #2e5077;
        --blue: #3b6ea5;
        --bg: #f5f7fb;
        --text: #1d2330;
        --muted: #667085;
      }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }
      .hero {
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      }
      h1 { margin-top: 0; color: var(--navy); }
      .top-links { margin-bottom: 16px; }
      .top-links a { color: var(--blue); font-weight: 600; text-decoration: none; }
      form { display: grid; gap: 16px; }
      fieldset { border: 1px solid #d8e1ec; border-radius: 10px; padding: 16px; background: #fcfdff; }
      legend { font-weight: 700; color: var(--navy); padding: 0 8px; }
      .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
      .field { display: flex; flex-direction: column; gap: 6px; }
      .field label { font-weight: 600; }
      input, textarea, select { border: 1px solid #cbd5e1; border-radius: 6px; padding: 10px; font: inherit; }
      textarea { min-height: 90px; resize: vertical; }
      .actions { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
      button { background: var(--navy); color: white; border: 0; border-radius: 6px; padding: 12px 18px; cursor: pointer; font-weight: 700; }
      .notice { margin-top: 12px; padding: 12px; border-radius: 8px; }
      .notice.error { background: #ffe6e6; color: #9b1c1c; }
      .notice.success { background: #eaf7ed; color: #1d6b3e; }
      .download-link { display: inline-block; margin-top: 8px; color: var(--blue); font-weight: 700; text-decoration: none; }
      @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="hero">
        <div class="top-links">
          <a href="/dashboard">Open Monthly Dashboard</a>
        </div>
        <h1>SQA Weekly Report Generator</h1>
        <p>Create a polished weekly executive summary PDF and keep the metrics in a local history.</p>
        <form id="report-form">
          <fieldset>
            <legend>Core Metrics</legend>
            <div class="grid">
              <div class="field"><label>Total Issues Reported</label><input name="total_issues" type="number" value="57" /></div>
              <div class="field"><label>Critical / High</label><input name="critical_high" type="number" value="37" /></div>
              <div class="field"><label>In Progress</label><input name="in_progress" type="number" value="4" /></div>
              <div class="field"><label>Resolved This Week</label><input name="resolved" type="number" value="58" /></div>
              <div class="field"><label>Pending</label><input name="pending" type="number" value="55" /></div>
              <div class="field"><label>Avg Resolution Time — Critical (hrs)</label><input name="avg_res_critical_hrs" type="number" step="0.1" value="3" /></div>
              <div class="field"><label>Avg Resolution Time — High (hrs)</label><input name="avg_res_high_hrs" type="number" step="0.1" value="5" /></div>
            </div>
          </fieldset>

          <fieldset>
            <legend>Metadata</legend>
            <div class="grid">
              <div class="field"><label>Prepared By</label><input name="prepared_by" value="MD ABDUL MOKADDES" required /></div>
              <div class="field"><label>Project / Module</label><input name="project_module" value="TAHWEEL" required /></div>
              <div class="field"><label>Report Date</label><input name="report_date" type="date" value="2026-07-04" required /></div>
              <div class="field"><label>Submitted To</label><input name="submitted_to" value="@email" required /></div>
            </div>
          </fieldset>

          <fieldset>
            <legend>Collaboration Feedback</legend>
            <div class="grid">
              <div class="field"><label>Communication Clarity</label><input name="comm_clarity_rating" value="3/5" required /></div>
              <div class="field"><label>SLA</label><input name="comm_clarity_sla" value="Average" required /></div>
              <div class="field"><label>Responsiveness to Bug Reports</label><input name="responsiveness_rating" value="4/5" required /></div>
              <div class="field"><label>SLA</label><input name="responsiveness_sla" value="Met" required /></div>
              <div class="field"><label>Support During Testing</label><input name="support_testing_rating" value="3/5" required /></div>
              <div class="field"><label>SLA</label><input name="support_testing_sla" value="Average" required /></div>
              <div class="field"><label>Fix Turnaround Time</label><input name="fix_turnaround_rating" value="4/5" required /></div>
              <div class="field"><label>SLA</label><input name="fix_turnaround_sla" value="Met" required /></div>
            </div>
          </fieldset>

          <fieldset>
            <legend>Executive Summary Content</legend>
            <div class="field"><label>Tested This Week</label><textarea name="tested_this_week" required>PIN Code restriction, Tahweel Mall, T-Football, Tahweel Boy, Security Check on Tahweel Boy &amp; T-Football, Kingdom Market, Account Type Limit, Agency Security Update, My Faatoorah.</textarea></div>
            <div class="field"><label>For Dev (must-follow points)</label><textarea name="for_dev" required>1. When discussing about any feature SQA should be present.
2. They should start writing solution plans first and then move into implementation.
3. They should share API documentation for each feature separately.</textarea></div>
            <div class="field"><label>Low-workload activities (optional)</label><textarea name="low_workload_activities"></textarea></div>
            <div class="field"><label>Announcement (optional)</label><textarea name="announcement"></textarea></div>
            <div class="field"><label>Next Week Focus</label><textarea name="next_week_focus" required>Account Type Limit, My Faatoorah, Security check on Tahweel Mall, Tahweel Mall, Tahweel Rewards</textarea></div>
          </fieldset>

          <div class="actions">
            <button type="submit">Generate Report</button>
            <span id="status"></span>
          </div>
          <div id="result"></div>
        </form>
      </div>
    </div>

    <script>
      const form = document.getElementById('report-form');
      const status = document.getElementById('status');
      const result = document.getElementById('result');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const data = new FormData(form);
        const payload = Object.fromEntries(data.entries());

        status.textContent = 'Generating report...';
        result.innerHTML = '';

        try {
          const response = await fetch('/generate-report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const json = await response.json();

          if (!response.ok || !json.success) {
            throw new Error(json.error || 'Report generation failed.');
          }

          result.innerHTML = `<div class="notice success">Report generated successfully.</div><a class="download-link" href="${json.downloadUrl}">Download PDF</a>`;
          status.textContent = '';
        } catch (error) {
          result.innerHTML = `<div class="notice error">${error.message}</div>`;
          status.textContent = '';
        }
      });
    </script>
  </body>
</html>
